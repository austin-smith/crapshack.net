name: Bug report
description: Report broken behavior or a regression.
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Search open and closed issues first, and keep the report focused on one problem.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Explain what happened and what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable reproduction you have.
      placeholder: |
        1.
        2.
        3.
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Include the browser, operating system, device, and affected page when known.
      placeholder: Safari 26 on macOS 26, https://crapshack.net/example

  - type: textarea
    id: evidence
    attributes:
      label: Additional evidence
      description: Add relevant screenshots, recordings, or console output. Redact sensitive information.
