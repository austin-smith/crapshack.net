name: Bug report
description: Report broken behavior, a regression, or a rendering problem.
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Search open and closed issues first, and keep the report focused on one problem.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Explain what happened and what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable reproduction you have.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: input
    id: page
    attributes:
      label: Affected page
      description: Include the page URL or route where the problem occurs.
      placeholder: https://crapshack.net/example
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include your browser and version, operating system, device or viewport, and whether the issue occurs in a private window.
      placeholder: Safari 26 on macOS 26, 1440 x 900; also reproducible in a private window
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Additional evidence
      description: Add relevant screenshots, recordings, console output, or other context. Remove personal or sensitive information.
